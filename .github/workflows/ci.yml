name: Documentation CI

# This is a temporary workflow for the architecture and documentation phase of SkillSync.
# It should be replaced with the production CI once the client/ and server/ applications are created.

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  validate-docs:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js (Latest)
      uses: actions/setup-node@v4
      with:
        node-version: 'latest'

    - name: Verify docs directory exists
      run: |
        if [ ! -d "docs" ]; then
          echo "Error: docs directory not found!"
          exit 1
        fi
        echo "docs directory verified."

    - name: Verify README.md exists
      run: |
        if [ ! -f "README.md" ]; then
          echo "Error: README.md not found!"
          exit 1
        fi
        echo "README.md verified."

    - name: Verify LICENSE exists
      run: |
        if [ ! -f "LICENSE" ]; then
          echo "Error: LICENSE not found!"
          exit 1
        fi
        echo "LICENSE verified."

    - name: Verify .github directory exists
      run: |
        if [ ! -d ".github" ]; then
          echo "Error: .github directory not found!"
          exit 1
        fi
        echo ".github directory verified."

    - name: Print Success
      run: echo "Documentation validation passed."
