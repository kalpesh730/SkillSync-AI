name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        
    - name: Install dependencies (Backend)
      run: if [ -f backend/package.json ]; then cd backend && npm ci; fi

    - name: Run lint (Backend)
      run: if [ -f backend/package.json ]; then cd backend && npm run lint --if-present; fi

    - name: Run tests (Backend)
      run: if [ -f backend/package.json ]; then cd backend && npm test --if-present; fi
      
    - name: Install dependencies (Frontend)
      run: if [ -f frontend/package.json ]; then cd frontend && npm ci; fi

    - name: Run lint (Frontend)
      run: if [ -f frontend/package.json ]; then cd frontend && npm run lint --if-present; fi

    - name: Run tests (Frontend)
      run: if [ -f frontend/package.json ]; then cd frontend && npm test --if-present; fi
