name: SkillSync CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  validate-repository:
    name: Verify Repository Structure
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Verify Required Files
      run: |
        if [ ! -f "README.md" ]; then echo "Error: README.md not found!"; exit 1; fi
        if [ ! -f "LICENSE" ]; then echo "Error: LICENSE not found!"; exit 1; fi
        if [ ! -f "client/.env.example" ]; then echo "Error: client/.env.example not found!"; exit 1; fi
        if [ ! -f "server/.env.example" ]; then echo "Error: server/.env.example not found!"; exit 1; fi
        echo "Repository structure verified."

  build-client:
    name: Validate Client
    runs-on: ubuntu-latest
    needs: validate-repository
    defaults:
      run:
        working-directory: ./client
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: './client/package-lock.json'

    - name: Install dependencies
      run: npm ci

    - name: Run Linter
      run: npm run lint

    - name: Build Frontend
      run: npm run build

  build-server:
    name: Validate Server
    runs-on: ubuntu-latest
    needs: validate-repository
    defaults:
      run:
        working-directory: ./server
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: './server/package-lock.json'

    - name: Install dependencies
      run: npm ci

    - name: Run Linter
      run: npm run lint
